<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Synthesis ML</title>
<!-- Google Fonts: Manrope -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS v3 -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            synthesis: {
              slate: '#4A6583',
              coral: '#F07D67', // Approximate coral from image
              dark: '#1A1A1A',
            }
          },
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
          },
          borderRadius: {
            'synthesis': '4px', // ROUND_FOUR from design system
          }
        }
      }
    }
  </script>
<!-- Custom Styles -->
<style data-purpose="layout">
    body {
      font-family: 'Manrope', sans-serif;
      margin: 0;
      padding: 0;
    }
    .split-screen {
      display: flex;
      min-height: 100vh;
      width: 100%;
    }
    .left-panel {
      flex: 1;
      background-color: #4A6583;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .right-panel {
      flex: 1;
      background-color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    /* Responsive adjust for mobile */
    @media (max-width: 768px) {
      .split-screen {
        flex-direction: column;
      }
      .left-panel {
        display: none; /* Hide visual panel on mobile for typical auth flow */
      }
    }
  </style>
<style data-purpose="visual-effects">/* Subtle overlay for the networking graphic aesthetic */
.network-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url(https://lh3.googleusercontent.com/aida/ADBb0ujTsNRD5iIhAWjL8Arfx2LbHCkCNNfZe4AY-diNm_a3WkTF2FH7HIv_BgpWN081qPo4P4qMjwfkxQeIKCVILz7EgXdt__8VX5D_yRi5BzKzzaT_Q2FZWZPSQ3E1pgf0eC6Ty90YlSPB8dD0Pm8VEWBUP25mKrOUpTY8sHOyne8bxTG9I2d5hE1-7qALpk5vS5llNVE3N698C8GMyCiIPd9r_kbsMEfJQlLMApNA7LtIrfpcJz9VxurMqqA);
    background-size: cover;
    background-position: center;
    opacity: 0.8;
    pointer-events: none
    }</style>
</head>
<body class="bg-white">
<!-- BEGIN: MainContainer -->
<main class="split-screen" data-purpose="auth-container">
<!-- BEGIN: VisualPanel -->
<section class="left-panel text-white p-12" data-purpose="brand-visuals">
<!-- Background Image Asset -->
<div class="network-overlay"></div>
<!-- Brand Logo/Header inside left panel -->
<div class="relative z-10 flex items-center gap-3">
<svg class="w-8 h-8" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<circle cx="12" cy="12" r="10" stroke="currentColor" stroke-dasharray="40 20" stroke-width="2"></circle>
<circle cx="12" cy="12" fill="currentColor" r="4"></circle>
</svg>
<span class="text-lg font-medium tracking-tight">Unlock AI-Driven Insights.</span>
</div>
<!-- Centered Text Overlay from Image -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<p class="text-sm font-light opacity-80">Unlock AI-Driven Insights.</p>
</div>
</section>
<!-- END: VisualPanel -->
<!-- BEGIN: FormPanel -->
<section class="right-panel" data-purpose="login-form-container">
<div class="w-full max-w-md">
<!-- Header Section -->
<header class="mb-10">
<h1 class="text-4xl font-bold text-gray-900 mb-2 leading-tight">Welcome <br/>Back</h1>
<p class="text-gray-500 text-sm leading-relaxed max-w-xs">
            Variant 2 of 10. Secure access to your analytics dashboard.
          </p>
</header>
<!-- Login Form -->
<form action="#" class="space-y-6" data-purpose="login-form" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-gray-800" for="email">Email Address</label>
<input class="w-full px-4 py-3 border border-gray-200 rounded-synthesis focus:ring-2 focus:ring-synthesis-slate focus:border-transparent outline-none transition-all placeholder-gray-400" id="email" name="email" placeholder="Email Address" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-gray-800" for="password">Password</label>
<div class="relative">
<input class="w-full px-4 py-3 border border-gray-200 rounded-synthesis focus:ring-2 focus:ring-synthesis-slate focus:border-transparent outline-none transition-all placeholder-gray-400" id="password" name="password" placeholder="Password" required="" type="password"/>
<!-- Eye Icon for show/hide password -->
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" type="button">
<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-start">
<a class="text-sm font-semibold text-synthesis-coral hover:opacity-80 transition-opacity" href="#">
              Forgot Password?
            </a>
</div>
<!-- Submit Button -->
<button class="w-full bg-synthesis-coral hover:bg-opacity-90 text-white font-semibold py-3.5 rounded-synthesis transition-all shadow-sm active:scale-[0.99]" type="submit">
            Log In
          </button>
</form>
<!-- Footer / Redirect -->
<footer class="mt-8 text-center" data-purpose="form-footer">
<p class="text-sm text-gray-600">
            Don't have an account? 
            <a class="text-synthesis-coral font-bold hover:underline" href="#">Sign Up.</a>
</p>
</footer>
</div>
</section>
<!-- END: FormPanel -->
</main>
<!-- END: MainContainer -->
<script data-purpose="form-interactivity">
    // Simple toggle for password visibility demonstration
    const passwordInput = document.getElementById('password');
    const toggleButton = passwordInput.nextElementSibling;

    toggleButton.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      
      // Toggle icon visibility would happen here in a full implementation
    });
  </script>
</body></html>
