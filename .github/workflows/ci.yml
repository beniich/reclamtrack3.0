name: CI — Quality Gate

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Cancel superseded runs on the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─── Shared env vars ──────────────────────────────────────────────────────────
env:
  NODE_ENV: test
  NODE_VERSION: '22'
  # Backend
  JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-jwt-secret-placeholder' }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'ci-refresh-secret-placeholder' }}
  MONGODB_URI: ${{ secrets.MONGODB_URI || 'mongodb://localhost:27017/reclamtrack_ci' }}
  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_ci_placeholder' }}
  FRONTEND_URL: http://localhost:3000
  PORT: 5001
  DISABLE_KAFKA: 'true'
  # Frontend – NEXT_PUBLIC_* are inlined at build time
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:5001/api' }}
  NEXT_PUBLIC_SOCKET_URL: ${{ secrets.NEXT_PUBLIC_SOCKET_URL || 'http://localhost:5001' }}
  NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID || '' }}
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY || 'pk_test_ci_placeholder' }}
  NEXT_PUBLIC_DEBUG_WIDGET_ENABLED: 'false'
  # NextAuth
  NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || 'http://localhost:3000' }}
  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-nextauth-secret-placeholder' }}
  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID || '' }}
  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET || '' }}
  STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_ci_placeholder' }}
  # Database (Prisma client generation – no real DB needed during build)
  DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/reclamtrack' }}

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 – Lint (matrix: backend + frontend)
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint — ${{ matrix.workspace }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install root + workspace deps
        run: npm ci --ignore-scripts

      - name: Build shared (required for type-checking)
        run: npm run build -w shared

      - name: ESLint — ${{ matrix.workspace }}
        run: npm run lint -w ${{ matrix.workspace }} --if-present

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 – TypeScript type-check
  # ───────────────────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript type-check — backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install root + workspace deps
        run: npm ci --ignore-scripts

      - name: Build shared
        run: npm run build -w shared

      - name: TypeScript — noEmit check (backend)
        run: npx tsc --noEmit -p backend/tsconfig.json

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 – Backend tests with coverage
  # ───────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Tests — backend (Jest + coverage)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install root + workspace deps
        run: npm ci --ignore-scripts

      - name: Build shared
        run: npm run build -w shared

      - name: Run Jest with coverage
        run: npm run test -w backend -- --coverage
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 14

      - name: Coverage summary (PR comment)
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        continue-on-error: true
        with:
          json-summary-path: backend/coverage/coverage-summary.json

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 – Build backend
  # ───────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build — Backend (TSC)
    runs-on: ubuntu-latest
    needs: [test-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install all workspace deps
        run: npm ci --ignore-scripts

      - name: Build shared package
        run: npm run build -w shared

      - name: TypeScript compile — backend
        run: npm run build -w backend

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5 – Build frontend (Next.js 15)
  # ───────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build — Frontend (Next.js)
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install all workspace deps
        run: npm ci --ignore-scripts

      - name: Build shared package
        run: npm run build -w shared

      - name: Next.js build
        run: npm run build -w frontend

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 6 – Security audit
  # ───────────────────────────────────────────────────────────────────────────
  security-audit:
    name: Security — npm audit
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install all workspace deps
        run: npm ci --ignore-scripts

      - name: Audit for high/critical vulnerabilities
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Audit — backend workspace
        run: npm audit --audit-level=high --workspace=backend
        continue-on-error: true

      - name: Audit — frontend workspace
        run: npm audit --audit-level=high --workspace=frontend
        continue-on-error: true
