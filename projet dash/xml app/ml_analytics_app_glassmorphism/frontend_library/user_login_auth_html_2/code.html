<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Synthesis ML</title>
<!-- MANROPE Font for Synthesis ML Design System -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: '#4A6583', // Custom color from design system
              accent: '#EE7D64', // Accent color for buttons (coral/salmon from image)
              dark: '#1A1A1A',
            }
          },
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
          },
          borderRadius: {
            'none': '0',
            'sm': '0.125rem',
            DEFAULT: '0.25rem', // ROUND_FOUR = 4px (0.25rem)
            'md': '0.375rem',
            'lg': '0.5rem',
            'full': '9999px',
          }
        }
      }
    }
  </script>
<style data-purpose="typography">
    body {
      font-family: 'Manrope', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    h1 {
      line-height: 1.1;
    }
  </style>
<style data-purpose="layout-tweaks">
    /* Split screen background for left side using the custom brand color */
    .bg-brand-gradient {
      background-color: #4A6583;
      background-image: linear-gradient(180deg, #4A6583 0%, #2D3E50 100%);
    }
    /* Vertical alignment for the left text */
    .hero-text-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      text-align: center;
    }
  </style>
</head>
<body class="bg-white text-gray-900 overflow-x-hidden">
<!-- BEGIN: MainContainer -->
<main class="min-h-screen flex flex-col md:flex-row">
<!-- BEGIN: VisualSide -->
<section class="hidden md:flex md:w-1/2 bg-brand-gradient relative overflow-hidden" data-purpose="branding-sidebar">
<!-- Top Left Logo/Text -->
<div class="absolute top-10 left-10 flex items-center gap-3 text-white z-20">
<svg class="w-8 h-8" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<circle cx="12" cy="12" r="10" stroke="currentColor" stroke-dasharray="45 15" stroke-width="2.5"></circle>
<circle cx="12" cy="12" fill="currentColor" r="4"></circle>
</svg>
<span class="font-semibold text-lg tracking-tight">Unlock AI-Driven Insights.</span>
</div>
<!-- Main Visual (Network Graph Placeholder) -->
<div class="relative w-full h-full flex items-center justify-center p-12">
<!-- Using the provided background image from the data store -->
<img alt="AI Network Visualization" class="w-full h-full object-cover opacity-80" src="https://lh3.googleusercontent.com/aida/ADBb0ujTsNRD5iIhAWjL8Arfx2LbHCkCNNfZe4AY-diNm_a3WkTF2FH7HIv_BgpWN081qPo4P4qMjwfkxQeIKCVILz7EgXdt__8VX5D_yRi5BzKzzaT_Q2FZWZPSQ3E1pgf0eC6Ty90YlSPB8dD0Pm8VEWBUP25mKrOUpTY8sHOyne8bxTG9I2d5hE1-7qALpk5vS5llNVE3N698C8GMyCiIPd9r_kbsMEfJQlLMApNA7LtIrfpcJz9VxurMqqA"/>
<!-- Text overlay from the visual -->
<div class="hero-text-overlay px-8">
<p class="text-white/60 text-sm font-medium tracking-widest uppercase">Unlock AI-Driven Insights.</p>
</div>
</div>
</section>
<!-- END: VisualSide -->
<!-- BEGIN: FormSide -->
<section class="flex-1 flex flex-col justify-center items-center px-6 py-12 md:px-24 bg-white" data-purpose="login-form-container">
<!-- Mobile Logo (Visible only on small screens) -->
<div class="md:hidden mb-12 flex items-center gap-2">
<div class="w-8 h-8 rounded-full border-2 border-brand-accent flex items-center justify-center">
<div class="w-2 h-2 bg-brand-accent rounded-full"></div>
</div>
<span class="font-bold text-gray-800">Synthesis ML</span>
</div>
<div class="w-full max-w-md">
<!-- Heading Block -->
<header class="mb-10">
<h1 class="text-4xl font-extrabold text-gray-900 mb-3">Welcome <br/>Back</h1>
<p class="text-gray-500 text-sm leading-relaxed">
            Variant 2 of 10. Secure access to your analytics dashboard.
          </p>
</header>
<!-- Login Form -->
<form action="#" class="space-y-6" data-purpose="authentication-form" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-bold text-gray-700" for="email">Email Address</label>
<input class="w-full px-4 py-3 border border-gray-200 rounded text-sm focus:ring-brand focus:border-brand outline-none transition-all" id="email" name="email" placeholder="Email Address" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-sm font-bold text-gray-700" for="password">Password</label>
<div class="relative">
<input class="w-full px-4 py-3 border border-gray-200 rounded text-sm focus:ring-brand focus:border-brand outline-none transition-all" id="password" name="password" placeholder="Password" required="" type="password"/>
<!-- Toggle Visibility Icon (Non-functional placeholder) -->
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400" type="button">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-start">
<a class="text-sm font-bold text-brand-accent hover:text-brand-accent/80 transition-colors" href="#">
              Forgot Password?
            </a>
</div>
<!-- Submit Button -->
<button class="w-full bg-brand-accent text-white font-bold py-4 rounded shadow-lg shadow-brand-accent/20 hover:bg-brand-accent/90 transition-all transform active:scale-[0.98]" type="submit">
            Log In
          </button>
</form>
<!-- Footer Navigation -->
<footer class="mt-10 text-center">
<p class="text-sm text-gray-600">
            Don't have an account? 
            <a class="text-brand-accent font-bold hover:underline" href="#">Sign Up.</a>
</p>
</footer>
</div>
</section>
<!-- END: FormSide -->
</main>
<!-- END: MainContainer -->
<!-- BEGIN: InteractiveScripts -->
<script data-purpose="form-interactivity">
    // Minimal interactivity for password toggle visualization
    const passwordInput = document.getElementById('password');
    const toggleBtn = passwordInput?.nextElementSibling;

    if (toggleBtn) {
      toggleBtn.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
      });
    }
  </script>
<!-- END: InteractiveScripts -->
</body></html>
