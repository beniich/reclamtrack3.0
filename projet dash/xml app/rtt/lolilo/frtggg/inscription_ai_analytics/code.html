<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Inscription - IA/ML Analytics</title>
<!-- Tailwind CSS v3 with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter for clean typography -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="global-typography">
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0b0b1a; /* Deep dark space background */
      color: #ffffff;
      margin: 0;
      overflow-x: hidden;
    }
  </style>
<style data-purpose="glassmorphism-effects">
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
    
    .input-glass {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
    }

    .input-glass:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: #f97316; /* Tailwind orange-500 */
      outline: none;
      box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2);
    }

    .orange-glow {
      text-shadow: 0 0 15px rgba(249, 115, 22, 0.6);
    }
    
    .button-gradient {
      background: linear-gradient(135deg, #fb923c 0%, #f97316 100%);
      box-shadow: 0 4px 15px rgba(249, 115, 22, 0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .button-gradient:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(249, 115, 22, 0.6);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">
<!-- BEGIN: MainHeader -->
<header class="w-full px-8 py-6 flex justify-between items-center fixed top-0 z-50">
<div class="flex items-center gap-2">
<!-- Logic: Placeholder for logo if needed, otherwise text -->
<span class="font-bold text-xl tracking-wider text-orange-500">IA/ML</span>
</div>
<nav class="hidden md:flex items-center space-x-8 text-sm font-medium text-gray-300">
<a class="hover:text-orange-400 transition-colors uppercase tracking-widest text-orange-500" href="#">Accueil</a>
<a class="hover:text-orange-400 transition-colors uppercase tracking-widest" href="#">À Propos</a>
<a class="hover:text-orange-400 transition-colors uppercase tracking-widest" href="#">Fonctionnalités</a>
<a class="hover:text-orange-400 transition-colors uppercase tracking-widest" href="#">Contact</a>
<button class="bg-white/10 p-2 rounded-full hover:bg-white/20 transition-colors">
<!-- User Icon placeholder -->
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</nav>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: MainContent -->
<main class="flex-grow flex items-center justify-center p-4 md:p-8 pt-24">
<div class="max-w-7xl w-full grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
<!-- Left Side: Visual -->
<div class="hidden lg:block relative" data-purpose="visual-container">
<!-- Image from DataStore -->
<img alt="Astronaute 3D et interfaces analytiques" class="w-full h-auto object-contain drop-shadow-2xl" src="https://lh3.googleusercontent.com/aida/ADBb0ug8G0jhWStW4pq532BKYKNSN92lzSmUVbMqC-iPL-RPME4FfdGz_MQG1mdqA5nEQJCktJ_USTjbgypI0EmniJDZcH0rUP0BF21HtkmXxrrfecRHCU2_0e-o448Qm8LNTdbNS8eLb9sUavBzxQxtiJ-X7Sl4EbTaAPPBxyvtZ59IPA4Q_-MGP0uWUaCjJvpBweRSk2WeEymaxgfaLz0rpV08gV5pYqzGCdjpYgB61SMDtwWtHAQt3G9wOWs"/>
<!-- Subtle overlay glows -->
<div class="absolute -top-20 -left-20 w-64 h-64 bg-purple-600/20 rounded-full blur-[100px]"></div>
<div class="absolute -bottom-20 -right-20 w-80 h-80 bg-orange-600/10 rounded-full blur-[100px]"></div>
</div>
<!-- Right Side: Registration Form -->
<div class="flex justify-center lg:justify-end" data-purpose="form-container">
<div class="glass-card w-full max-w-lg p-8 md:p-12 rounded-3xl" data-purpose="registration-card">
<div class="text-center mb-10">
<h1 class="text-3xl md:text-4xl font-bold orange-glow mb-2">Inscription</h1>
<p class="text-gray-400 font-medium">IA/ML Analytics</p>
</div>
<form action="#" class="space-y-6" method="POST">
<!-- Full Name -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-300 ml-1" for="full-name">Nom Complet</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</span>
<input class="input-glass w-full py-4 pl-12 pr-4 rounded-xl text-white placeholder-gray-500" id="full-name" name="full-name" placeholder="Votre nom complet" type="text"/>
</div>
</div>
<!-- Email Address -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-300 ml-1" for="email">Adresse E-mail</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</span>
<input class="input-glass w-full py-4 pl-12 pr-4 rounded-xl text-white placeholder-gray-500" id="email" name="email" placeholder="email@exemple.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-300 ml-1" for="password">Créer un Mot de Passe</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</span>
<input class="input-glass w-full py-4 pl-12 pr-4 rounded-xl text-white placeholder-gray-500" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="button-gradient w-full py-4 rounded-xl text-white font-bold text-lg uppercase tracking-widest mt-4" type="submit">
              S'inscrire Maintenant
            </button>
<!-- Login Link -->
<p class="text-center text-gray-400 text-sm mt-6">
              Vous avez déjà un compte ? <a class="text-orange-400 hover:text-orange-300 font-semibold underline underline-offset-4" href="#">Connexion</a>
</p>
</form>
</div>
</div>
</div>
</main>
<!-- END: MainContent -->
<!-- BEGIN: Footer -->
<footer class="w-full px-8 py-8 flex flex-col md:flex-row justify-between items-center gap-6 text-xs text-gray-500">
<div data-purpose="copyright">
      © 2024 AI/ML Analytics. Tous droits réservés.
    </div>
<div class="flex items-center space-x-6" data-purpose="social-links">
<a class="hover:text-white transition-colors" href="#">
<span class="sr-only">X (Twitter)</span>
<svg class="h-4 w-4 fill-current" viewbox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
</a>
<a class="hover:text-white transition-colors" href="#">
<span class="sr-only">Facebook</span>
<svg class="h-4 w-4 fill-current" viewbox="0 0 24 24"><path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"></path></svg>
</a>
<a class="hover:text-white transition-colors" href="#">
<span class="sr-only">YouTube</span>
<svg class="h-4 w-4 fill-current" viewbox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"></path></svg>
</a>
</div>
</footer>
<!-- END: Footer -->
</body></html>
