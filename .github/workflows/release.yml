name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Validate — run full test suite before release
  # ───────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate before release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Build shared
        run: npm run build -w shared

      - name: Lint
        run: npm run lint --if-present

      - name: TypeScript check
        run: npx tsc --noEmit -p backend/tsconfig.json

      - name: Tests
        run: npm run test -w backend
        env:
          CI: true
          JWT_SECRET: ci-jwt-secret
          JWT_REFRESH_SECRET: ci-refresh-secret
          MONGODB_URI: mongodb://localhost:27017/reclamtrack_ci
          DISABLE_KAFKA: 'true'

  # ───────────────────────────────────────────────────────────────────────────
  # Build Docker images
  # ───────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: [validate]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ───────────────────────────────────────────────────────────────────────────
  # GitHub Release with auto-generated changelog
  # ───────────────────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker-build]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: --verbose --latest
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.content || 'See commit history for changes.' }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
